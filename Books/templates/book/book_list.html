{% extends '_base.html' %}
{% block page_title %}
    لیست کتاب ها
{% endblock %}
{% block content %}
    {% for book in books %}
        <a href="{{ book.get_absolute_url }}"><h1>{{ book.title }}</h1></a>
        <h6>{{ book.author }}</h6>
        <p>{{ book.price }}</p>
        <hr>
    {% endfor %}
    <a href="{% url 'book_create' %}">+</a>
{% endblock %}
