{% extends '_base.html' %}
{% block page_title %}
    توضیح کتاب {{book.title }}
{% endblock %}
{% block content %}
    <h1>{{ book.title }}</h1>
    <h6>{{ book.author }}</h6>
    <p>{{ book.description }}</p>
    <h5>{{ book.price }}</h5>
    <br>
    <a href="{% url 'book_list' %}"><-</a>
    <a class="btn btn-warning" href="{% url 'update_view' book.id %}">ویرایش</a>
    <a class=" btn btn-danger" href="{% url 'delete_view' book.id %}">حذف</a>

{% endblock %}
